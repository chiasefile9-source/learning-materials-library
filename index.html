<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Viện Điện Tử - By VTuyen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --card-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        .logo-area {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            font-weight: 800;
        }

        p {
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .main-link {
            display: block;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 18px 25px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 14px 0 rgba(37, 99, 235, 0.39);
        }

        .main-link:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .emoji {
            display: block;
            font-size: 1.5rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">BY VTUYEN</div>
        
        <h1>Thư Viện Điện Tử</h1>
        
        <p>Toàn bộ File Bài tập + Soạn Văn + KHTN. Truy cập và học tập hoàn toàn tự do tại đây!</p>

        <a href="https://drive.google.com/drive/folders/1G07LVX36gNEqi0KksYWz0lI1JG_eF7rN?usp=sharing" 
           class="main-link" target="_blank">
            By VTuyen - Not sharing
        </a>

        <span class="emoji">👇</span>

        <div class="footer-note">
            &copy; 2026 Thư Viện Học Tập. Chúc bạn học tốt!
        </div>
    </div>

</body>
</html>
